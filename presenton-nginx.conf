user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  client_max_body_size 100M;

  server {
    listen 80;
    server_name localhost;

    location / {
      proxy_pass http://localhost:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;

      # Required for sub_filter to work on compressed responses
      proxy_set_header Accept-Encoding "";

      sub_filter_types text/html;
      sub_filter_once on;
      sub_filter '</head>' '<style>
        img[alt="PresentOn"],img[alt="Presenton"],img[alt="presenton"],
        img[src*="logo-with-bg"],img[src*="Logo.png"],img[src*="logo-white"]{display:none!important}
        [class*="presenton"],[id*="presenton"]{display:none!important}
      </style><script>
        (function(){
          function applyBranding(){
            document.querySelectorAll(
              "img[alt=\"PresentOn\"],img[alt=\"Presenton\"],img[alt=\"presenton\"],img[src*=\"logo-with-bg\"],img[src*=\"Logo.png\"],img[src*=\"logo-white\"]"
            ).forEach(function(el){
              el.style.display="none";
              var parent=el.parentElement;
              if(parent&&!parent.querySelector(".jooma-brand")){
                var span=document.createElement("span");
                span.className="jooma-brand";
                span.style.cssText="font-size:18px;font-weight:800;color:#4a4a4a;letter-spacing:-0.5px;cursor:pointer;";
                span.textContent="Jooma";
                parent.insertBefore(span,el.nextSibling);
              }
            });
            if(document.title.toLowerCase().includes("presenton")){
              document.title="Jooma";
            }
          }
          if(document.readyState==="loading"){
            document.addEventListener("DOMContentLoaded",applyBranding);
          } else {
            applyBranding();
          }
          var observer=new MutationObserver(applyBranding);
          observer.observe(document.documentElement,{childList:true,subtree:true});
        })();
      </script></head>';
    }

    location /api/v1/ {
      proxy_pass http://localhost:8000;
      proxy_read_timeout 30m;
      proxy_send_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mcp/ {
      proxy_pass http://localhost:8001/mcp/;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mcp {
      proxy_pass http://localhost:8001/mcp;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
      proxy_pass http://localhost:8000/docs;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
      proxy_pass http://localhost:8000/openapi.json;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /_auth_check {
      internal;
      proxy_pass http://localhost:8000/api/v1/auth/verify;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header Host $host;
      proxy_set_header Cookie $http_cookie;
    }

    location /static {
      alias /app/servers/fastapi/static/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /app_data/images/ {
      auth_request /_auth_check;
      alias /app_data/images/;
      expires 1y;
      add_header Cache-Control "private, max-age=31536000";
    }

    location /app_data/exports/ {
      auth_request /_auth_check;
      alias /app_data/exports/;
      expires 1y;
      add_header Cache-Control "private, max-age=31536000";
    }

    location /app_data/uploads/ {
      auth_request /_auth_check;
      alias /app_data/uploads/;
      expires 1y;
      add_header Cache-Control "private, max-age=31536000";
    }

    location /app_data/fonts/ {
      auth_request /_auth_check;
      alias /app_data/fonts/;
      expires 1y;
      add_header Cache-Control "private, max-age=31536000";
    }

    location /app_data/pptx-to-html/ {
      auth_request /_auth_check;
      alias /app_data/pptx-to-html/;
      expires 1y;
      add_header Cache-Control "private, max-age=31536000";
    }
  }
}
